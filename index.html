<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marvel Rivals | Fanpage Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <div class="navbar">
        <div class="logo">MARVEL RIVALS</div>
        <ul class="nav-links">
            <li><a href="#news">Noticias</a></li>
            <li><a href="#heroes">Héroes</a></li>
        </ul>
    </div>
</header>

<section class="hero">
    <div class="hero-box">
        <h1>SEASON 7</h1>
        <p>THE HUNT IS ON</p>
        <a href="#heroes" class="btn">Ver héroes</a>
    </div>
</section>

<section id="news">
<h2 class="title">Noticias</h2>
<div class="grid">

<div class="card">
<img src="https://sm.ign.com/t/ign_latam/screenshot/default/marvel-rivals-white-fox_r7sm.1200.jpg">
<h3>White Fox llega</h3>
<p>Nueva estratega con habilidades de ilusión</p>
</div>

<div class="card">
<img src="https://cdn.marvel.com/content/1x/deadpool_0.jpg">
<h3>Evento Deadpool</h3>
<p>Consigue recompensas gratis</p>
</div>

</div>
</section>

<section id="heroes">
<h2 class="title">Héroes</h2>

<div class="filters">
<button class="filter active" data-filter="all">Todos</button>
<button class="filter" data-filter="duelista">Duelistas</button>
<button class="filter" data-filter="mago">Magos</button>
</div>

<div class="grid">

<div class="card hero duelista">
<img src="https://cdn.marvel.com/content/1x/ironman_lob_crd_01_10.jpg">
<h3>Iron Man</h3>
</div>

<div class="card hero duelista">
<img src="https://cdn.marvel.com/content/1x/gambit_lob_crd_01.jpg">
<h3>Gambit</h3>
</div>

<div class="card hero mago">
<img src="https://cdn.marvel.com/content/1x/drstrange_lob_crd_01.jpg">
<h3>Doctor Strange</h3>
</div>

<div class="card hero mago">
<img src="https://cdn.marvel.com/content/1x/loki_lob_crd_01.jpg">
<h3>Loki</h3>
</div>

</div>
</section>

<footer class="footer">
<p>Proyecto Web Profesional - Marvel Rivals</p>
</footer>

<script src="script.js"></script>
</body>
</html>
